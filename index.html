<style>
  :root {
    --root-cream: #f0ebdd;
    --soul-purple: #1e1a34;
    --balance-purple: #606085;
    --body-blue: #62bfbd;
    --vau-green: #44725d;
    --spirit-green: #dbdf34;
    --font-main: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-main);
    background: var(--root-cream);
    color: var(--soul-purple);
    min-height: 100vh;
  }

  /* Header */
  .site-header {
    background: var(--soul-purple);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-text {
    font-size: 26px;
    font-weight: 700;
    color: var(--root-cream);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .logo-text span {
    font-weight: 300;
    font-size: 13px;
    display: block;
    letter-spacing: 0.12em;
    margin-top: 2px;
    opacity: 0.6;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(96,96,133,0.3);
    color: var(--body-blue);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .header-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--body-blue);
  }
  .header-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .header-actions button {
    background: rgba(240,235,221,0.08);
    color: var(--root-cream);
    border: 1px solid rgba(240,235,221,0.12);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font-main);
    font-weight: 400;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .header-actions button:hover {
    background: rgba(240,235,221,0.16);
    border-color: rgba(240,235,221,0.25);
  }

  /* Main */
  .main-content {
    max-width: 1280px;
    margin: 0 auto;
    padding: 24px 32px 48px 32px;
  }

  /* Buttons & inputs */
  button {
    cursor: pointer;
    font-family: var(--font-main);
    border: 1px solid rgba(30,26,52,0.12);
    background: rgba(30,26,52,0.04);
    border-radius: 8px;
    color: var(--soul-purple);
    transition: all 0.15s;
  }
  button:hover { background: rgba(30,26,52,0.08); }
  input, select {
    font-family: var(--font-main);
    outline: none;
  }
  input:focus, select:focus {
    border-color: var(--balance-purple) !important;
    box-shadow: 0 0 0 2px rgba(96,96,133,0.15);
  }
  a { text-decoration: none; color: var(--vau-green); }
  a:hover { text-decoration: underline; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--soul-purple);
    color: var(--root-cream);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(30,26,52,0.25);
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Subtle gradient glow */
  .gradient-glow {
    position: fixed;
    bottom: -200px;
    right: -200px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(98,191,189,0.08) 0%, rgba(219,223,52,0.04) 50%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(30,26,52,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(30,26,52,0.25); }
</style>
</head>

}

function ItemRow({ item, statusOpts, isSkill, onUpdate, onDelete, sharedIn }) {
  const [open, setOpen] = useState(false);
  const [d, setD] = useState({ ...item });
  const sc = isSkill ? (SK_COLORS[item.color] || SK_COLORS.gray) : null;
  const stc = ST[item.status] || ST["a definir"];

  const inputStyle = { fontSize:12, padding:"4px 8px", borderRadius:8, border:"1px solid rgba(30,26,52,0.12)", background:"#fff", color:"#1e1a34", fontFamily:"var(--font-main)" };

  if (!open) return (
    <div onClick={() => setOpen(true)}
      style={{ display:"flex", flexWrap:"wrap", gap:5, alignItems:"center", padding:"5px 8px", borderRadius:8, cursor:"pointer", marginBottom:2, transition:"background 0.15s" }}
      onMouseEnter={e=>e.currentTarget.style.background="rgba(30,26,52,0.03)"}
      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
      {isSkill
        ? <span style={{ fontSize:11, padding:"3px 10px", borderRadius:20, background:sc.bg, color:sc.text, fontWeight:500, border:sc.dashed?"1.5px dashed rgba(30,26,52,0.2)":"1px solid transparent", whiteSpace:"nowrap" }}>{item.name}</span>
        : <span style={{ fontSize:11, padding:"3px 10px", borderRadius:20, background:"rgba(68,114,93,0.1)", color:"#44725d", fontWeight:500, whiteSpace:"nowrap" }}>{item.name}</span>
      }
      {item.status !== "a definir" && <span style={{ fontSize:10, padding:"2px 8px", borderRadius:12, background:stc.bg, color:stc.text, fontWeight:500 }}>{item.status}</span>}
      {sharedIn > 0 && <span title={`Compartido en ${sharedIn} proyecto${sharedIn>1?"s":""} — los cambios se sincronizan`} style={{ fontSize:9, padding:"2px 5px", borderRadius:4, background:"var(--soul-purple)", color:"var(--root-cream)", fontWeight:600 }}>🔁 {sharedIn}</span>}
      {item.owner && <span style={{ fontSize:10, color:"var(--balance-purple)" }}>{item.owner}</span>}
      {item.drive && <a href={item.drive} onClick={e=>e.stopPropagation()} target="_blank" rel="noopener" style={{ fontSize:10 }}>Drive ↗</a>}
      {(item.notes) && <span style={{ fontSize:10, color:"var(--balance-purple)", fontStyle:"italic", opacity:0.7 }}>{item.notes}</span>}
      <span style={{ fontSize:10, color:"rgba(30,26,52,0.25)", marginLeft:2 }}>✎</span>
    </div>
  );

  return (
    <div style={{ display:"flex", flexWrap:"wrap", gap:6, padding:"8px 10px", borderRadius:10, background:"rgba(30,26,52,0.03)", marginBottom:4, border:"1px solid rgba(30,26,52,0.06)" }}>
      <input value={d.name} onChange={e=>setD(x=>({...x,name:e.target.value}))} placeholder="Nombre" style={{...inputStyle, width:170}} />
      {isSkill && (
        <select value={d.color} onChange={e=>setD(x=>({...x,color:e.target.value}))} style={{...inputStyle}}>
          {Object.keys(SK_COLORS).map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      )}
      <select value={d.status} onChange={e=>setD(x=>({...x,status:e.target.value}))} style={{...inputStyle}}>
        {statusOpts.map(s=><option key={s} value={s}>{s}</option>)}
      </select>
      <input value={d.owner} onChange={e=>setD(x=>({...x,owner:e.target.value}))} placeholder="Owner" style={{...inputStyle, width:80}} />
      <input value={d.drive} onChange={e=>setD(x=>({...x,drive:e.target.value}))} placeholder="Link Drive / GitHub" style={{...inputStyle, width:160}} />
      <input value={d.notes||""} onChange={e=>setD(x=>({...x,notes:e.target.value}))} placeholder="Notas" style={{...inputStyle, width:200}} />
      <button onClick={()=>{ onUpdate(d); setOpen(false); }} style={{ fontSize:11, padding:"4px 12px", background:"var(--soul-purple)", color:"var(--root-cream)", border:"none", borderRadius:8 }}>Guardar</button>
      <button onClick={()=>setOpen(false)} style={{ fontSize:11, padding:"4px 12px" }}>Cancelar</button>
      <button onClick={onDelete} style={{ fontSize:11, padding:"4px 12px", color:"#c0392b", borderColor:"rgba(192,57,43,0.2)" }}>Eliminar</button>
    </div>
  );
}

/* ProjectCard */
function ProjectCard({ p, onUpdate, tab, allProjects }) {
  const [exp, setExp] = useState(false);
  const [addSk, setAddSk] = useState(false);
  const [addKb, setAddKb] = useState(false);
  const [addIns, setAddIns] = useState(false);
  const [nSk, setNSk] = useState({ name:"", color:"gray", status:"❌ Por crear", owner:"", drive:"" });
  const [nKb, setNKb] = useState({ name:"", status:"❌ Por crear", owner:"", drive:"", notes:"" });
  const [nIns, setNIns] = useState({ name:"", status:"❌ Por crear", owner:"", drive:"", notes:"" });
  const [editLink, setEditLink] = useState(false);
  const [linkVal, setLinkVal] = useState(p.driveLink||"");
  const cat = CAT[p.cat];

  const realSk = p.skills.filter(s=>s.name!=="skills a definir");
  const creadasSk = realSk.filter(s=>s.status==="✅ Creada").length;
  const actKb  = p.kb.filter(k=>k.status==="✅ Actualizado").length;
  const sharedSk = realSk.filter(s=>s.color==="shared").length;

  // Count how many OTHER projects share each skill/kb by name
  function getSharedCount(itemName, type) {
    if (!allProjects) return 0;
    return allProjects.filter(proj => proj.id !== p.id && (type === "skill" ? proj.skills : type === "kb" ? proj.kb : (proj.instructions||[])).some(x => x.name === itemName)).length;
  }

  function upSk(i,v){ onUpdate({...p,skills:p.skills.map((s,j)=>j===i?v:s)}); }
  function delSk(i){ const sk=p.skills.filter((_,j)=>j!==i); onUpdate({...p,skills:sk.length?sk:[{name:"skills a definir",color:"tbd",status:"a definir",owner:"",drive:""}]}); }
  function upKb(i,v){ onUpdate({...p,kb:p.kb.map((k,j)=>j===i?v:k)}); }
  function delKb(i){ onUpdate({...p,kb:p.kb.filter((_,j)=>j!==i)}); }
  function upIns(i,v){ onUpdate({...p,instructions:(p.instructions||[]).map((x,j)=>j===i?v:x)}); }
  function delIns(i){ onUpdate({...p,instructions:(p.instructions||[]).filter((_,j)=>j!==i)}); }

  const ins = p.instructions||[];
  const actIns = ins.filter(x=>x.status==="✅ Lista").length;
  const list = tab==="skills" ? p.skills : tab==="kb" ? p.kb : ins;
  const inputStyle = { fontSize:12, padding:"4px 8px", borderRadius:8, border:"1px solid rgba(30,26,52,0.12)", background:"#fff", color:"#1e1a34", fontFamily:"var(--font-main)" };

  return (
    <div style={{ borderRadius:12, border:"1px solid rgba(30,26,52,0.08)", marginBottom:6, overflow:"hidden", background:"rgba(255,255,255,0.5)", backdropFilter:"blur(8px)", transition:"box-shadow 0.2s" }}
      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 12px rgba(30,26,52,0.06)"}
      onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      <div style={{ display:"grid", gridTemplateColumns:"210px 1fr 1fr", gap:10, padding:"10px 14px", cursor:"pointer", alignItems:"start" }}
        onClick={()=>setExp(e=>!e)}>
        <div>
          <span style={{ display:"inline-block", fontSize:9, padding:"2px 8px", borderRadius:6, fontWeight:600, background:cat.bg, color:cat.text, marginBottom:4, letterSpacing:"0.04em" }}>{p.cat}</span>
          <div style={{ fontSize:13, fontWeight:600, color:"var(--soul-purple)", lineHeight:1.35, letterSpacing:"-0.01em" }}>{p.name}{p.lock?" 🔒":""}</div>
          <div style={{ fontSize:10, color:"var(--balance-purple)", marginTop:2 }}>{p.owners}</div>
          <div style={{ fontSize:10, color:"var(--balance-purple)", marginTop:3, opacity:0.7 }}>
            {tab==="skills" ? `${creadasSk}/${realSk.length} creadas · ${sharedSk} 🔁` : tab==="kb" ? `${actKb}/${p.kb.length} KB actualizados` : `${actIns}/${ins.length} instrucciones listas`}
          </div>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:4, paddingTop:2 }}>
          {p.areas.map(a=>(
            <span key={a} style={{ fontSize:10, padding:"3px 8px", borderRadius:10, background:AREA_COLORS[a]||"rgba(30,26,52,0.06)", color:AREA_TEXT[a]||"#1e1a34", fontWeight:500, whiteSpace:"nowrap", lineHeight:1.4 }}>{a}</span>
          ))}
          <span style={{ fontSize:10, padding:"3px 8px", borderRadius:10, fontWeight:500, whiteSpace:"nowrap", lineHeight:1.4,
            background:p.mcp==="activo"?"rgba(98,191,189,0.15)":"rgba(30,26,52,0.04)",
            color:p.mcp==="activo"?"#1e1a34":"var(--balance-purple)",
            border:p.mcp!=="activo"?"1px dashed rgba(30,26,52,0.15)":"1px solid transparent" }}>
            {p.mcp==="activo"?"MCP ✦":"MCP opt."}
          </span>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:4, paddingTop:2, alignItems:"center" }}>
          {list.slice(0, exp?undefined:3).map((item,i)=>{
            if (tab==="skills") {
              const sc=SK_COLORS[item.color]||SK_COLORS.gray;
              const stc=ST[item.status]||ST["a definir"];
              return (
                <span key={i} style={{ display:"inline-flex", gap:3, alignItems:"center" }}>
                  <span style={{ fontSize:10, padding:"3px 8px", borderRadius:10, background:sc.bg, color:sc.text, fontWeight:500, border:sc.dashed?"1.5px dashed rgba(30,26,52,0.15)":"1px solid transparent", whiteSpace:"nowrap" }}>{item.name}</span>
                  {item.status!=="a definir" && <span style={{ fontSize:9, padding:"2px 5px", borderRadius:8, background:stc.bg, color:stc.text }}>{item.status}</span>}
                  {getSharedCount(item.name,"skill") > 0 && <span style={{ fontSize:8, padding:"1px 4px", borderRadius:4, background:"var(--soul-purple)", color:"var(--root-cream)" }}>🔁</span>}
                </span>
              );
            }
            const stc=ST[item.status]||ST["a definir"];
            const itemType = tab==="kb"?"kb":"ins";
            const itemShared = getSharedCount(item.name, itemType);
            const chipBg = tab==="kb" ? "rgba(68,114,93,0.1)" : "rgba(96,96,133,0.1)";
            const chipColor = tab==="kb" ? "#44725d" : "#606085";
            return (
              <span key={i} style={{ display:"inline-flex", gap:3, alignItems:"center" }}>
                <span style={{ fontSize:10, padding:"3px 8px", borderRadius:10, background:chipBg, color:chipColor, fontWeight:500, whiteSpace:"nowrap" }}>{item.name}</span>
                <span style={{ fontSize:9, padding:"2px 5px", borderRadius:8, background:stc.bg, color:stc.text }}>{item.status}</span>
                {itemShared > 0 && <span style={{ fontSize:8, padding:"1px 4px", borderRadius:4, background:"var(--soul-purple)", color:"var(--root-cream)" }}>🔁</span>}
              </span>

          {!exp && list.length>3 && <span style={{ fontSize:10, color:"var(--balance-purple)", opacity:0.6 }}>+{list.length-3}</span>}
          <span style={{ fontSize:11, color:"var(--balance-purple)", marginLeft:"auto", opacity:0.4 }}>{exp?"▲":"▼"}</span>
        </div>
      </div>

      {exp && (
        <div style={{ padding:"0 14px 14px 14px", borderTop:"1px solid rgba(30,26,52,0.06)" }}>
          {tab==="skills" && (
            <>
              <div style={{ fontSize:10, color:"var(--balance-purple)", padding:"10px 0 6px 0", opacity:0.6, letterSpacing:"0.03em" }}>
                SKILLS — clic para editar · 🔁 = compartida entre proyectos
              </div>
              {p.skills.map((sk,i)=>(
                <ItemRow key={i} item={sk} statusOpts={SK_STATUS} isSkill={true} onUpdate={v=>upSk(i,v)} onDelete={()=>delSk(i)} sharedIn={getSharedCount(sk.name,"skill")} />
              ))}
              {addSk ? (
                <div style={{ display:"flex", flexDirection:"column", gap:8, marginTop:8, padding:"10px 12px", borderRadius:10, background:"rgba(30,26,52,0.03)", border:"1px solid rgba(30,26,52,0.06)" }}>
                  {/* Picker: existing skills from other projects */}
                  {(() => {
                    const currentNames = new Set(p.skills.map(s => s.name.trim()));
                    const existing = [];
                    const seen = new Set();
                    (allProjects||[]).forEach(proj => {
                      if (proj.id === p.id) return;
                      proj.skills.forEach(s => {
                        const n = s.name.trim();
                        if (n === "skills a definir" || currentNames.has(n) || seen.has(n)) return;
                        seen.add(n);
                        existing.push(s);
                      });
                    });
                    if (existing.length === 0) return null;
                    return (
                      <div>
                        <div style={{ fontSize:10, color:"var(--balance-purple)", marginBottom:4, opacity:0.7 }}>Agregar skill existente de otro proyecto:</div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                          {existing.map((s,i) => {
                            const sc = SK_COLORS[s.color] || SK_COLORS.gray;
                            return (
                              <button key={i} onClick={() => {
                                const sk = p.skills.filter(x => x.name !== "skills a definir");
                                onUpdate({...p, skills:[...sk, {...s}]});
                                setAddSk(false);
                                showToast("Skill '" + s.name + "' agregada (compartida)");
                              }} style={{ fontSize:10, padding:"4px 10px", borderRadius:14, background:sc.bg, color:sc.text, border:sc.dashed?"1.5px dashed rgba(30,26,52,0.2)":"1px solid rgba(30,26,52,0.08)", cursor:"pointer", fontWeight:500 }}>
                                {s.name} <span style={{opacity:0.5, fontSize:9}}>({s.status})</span>
                              </button>

                        </div>
                        <div style={{ fontSize:10, color:"var(--balance-purple)", margin:"8px 0 4px", opacity:0.7 }}>O crear una nueva:</div>
                      </div>
                    );
                  })()}
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    <input value={nSk.name} onChange={e=>setNSk(d=>({...d,name:e.target.value}))} placeholder="Nombre skill" style={{...inputStyle, width:170}} />
                    <select value={nSk.color} onChange={e=>setNSk(d=>({...d,color:e.target.value}))} style={inputStyle}>

                    <button onClick={()=>{ if(!nSk.name.trim())return; const sk=p.skills.filter(s=>s.name!=="skills a definir"); onUpdate({...p,skills:[...sk,{...nSk}]}); setNSk({name:"",color:"gray",status:"❌ Por crear",owner:"",drive:""}); setAddSk(false); }} style={{ fontSize:11, padding:"4px 12px", background:"var(--soul-purple)", color:"var(--root-cream)", border:"none", borderRadius:8 }}>Añadir nueva</button>

                                {k.name} <span style={{opacity:0.5, fontSize:9}}>({k.status})</span>

                        <div style={{ fontSize:10, color:"var(--balance-purple)", margin:"8px 0 4px", opacity:0.7 }}>O crear uno nuevo:</div>
                      </div>

                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>

                  {/* Picker: existing instructions from other projects */}
                  {(() => {

                    <input value={nIns.notes} onChange={e=>setNIns(d=>({...d,notes:e.target.value}))} placeholder="Notas" style={{...inputStyle, width:200}} />
                    <button onClick={()=>{ if(!nIns.name.trim())return; onUpdate({...p,instructions:[...ins,{...nIns}]}); setNIns({name:"",status:"❌ Por crear",owner:"",drive:"",notes:""}); setAddIns(false); }} style={{ fontSize:11, padding:"4px 12px", background:"var(--soul-purple)", color:"var(--root-cream)", border:"none", borderRadius:8 }}>Añadir nueva</button>
                    <button onClick={()=>setAddIns(false)} style={{ fontSize:11, padding:"4px 12px" }}>Cancelar</button>
                  </div>
                </div>
              ) : <button onClick={()=>setAddIns(true)} style={{ fontSize:11, marginTop:8, padding:"5px 14px", borderRadius:8 }}>+ Añadir instrucción</button>}
            </>
          )}
          <div style={{ fontSize:10, color:"var(--balance-purple)", padding:"12px 0 4px 0", opacity:0.5, letterSpacing:"0.03em" }}>LINK INSTRUCCIONES / DRIVE</div>
          {editLink ? (
            <div style={{ display:"flex", gap:6 }}>
              <input value={linkVal} onChange={e=>setLinkVal(e.target.value)} placeholder="https://drive.google.com/..." style={{...{fontSize:12, padding:"4px 8px", borderRadius:8, border:"1px solid rgba(30,26,52,0.12)", background:"#fff", color:"#1e1a34", fontFamily:"var(--font-main)"}, flex:1}} />
              <button onClick={()=>{ onUpdate({...p,driveLink:linkVal}); setEditLink(false); }} style={{ fontSize:11, padding:"4px 12px", background:"var(--soul-purple)", color:"var(--root-cream)", border:"none", borderRadius:8 }}>Guardar</button>
              <button onClick={()=>setEditLink(false)} style={{ fontSize:11, padding:"4px 12px" }}>Cancelar</button>
            </div>
          ) : p.driveLink ? (
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <a href={p.driveLink} target="_blank" rel="noopener" style={{ fontSize:11 }}>{p.driveLink}</a>
              <button onClick={()=>setEditLink(true)} style={{ fontSize:10, padding:"2px 8px" }}>Editar</button>
            </div>
          ) : <button onClick={()=>setEditLink(true)} style={{ fontSize:11, padding:"5px 14px", borderRadius:8 }}>+ Añadir link</button>}
        </div>
      )}
    </div>
  );
}

/* App */
function App() {
  const [projects, setProjects] = useState(INIT);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("skills");
  const [filter, setFilter] = useState("todos");
  const [saving, setSaving] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);

  useEffect(()=>{
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        let p = JSON.parse(raw);
        if (Array.isArray(p)&&p.length>0) {
          // Migration: add instructions array if missing
          p = p.map(proj => {
            if (!proj.instructions) {
              return { ...proj, instructions: [{ name:"Project instructions", status:"❌ Por crear", owner:"", drive:"", notes:"Por definir." }] };
            }
            return proj;
          });
          setProjects(p);
        }
      }
    } catch(e){}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded) return;
    setSaving(true);
    const t = setTimeout(()=>{
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); setLastSaved(new Date()); } catch(e){}
      setSaving(false);
    }, 600);
    return ()=>clearTimeout(t);
  },[projects, loaded]);

  useEffect(()=>{
    const exportBtn = document.getElementById("exportBtn");
    const handleExport = () => {
      const blob = new Blob([JSON.stringify(projects, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "vau_dashboard_" + new Date().toISOString().slice(0,10) + ".json"; a.click();
      URL.revokeObjectURL(url);
      showToast("Backup exportado");
    };
    exportBtn.addEventListener("click", handleExport);
    const importBtn = document.getElementById("importBtn");
    const importFile = document.getElementById("importFile");
    const handleImportClick = () => importFile.click();
    const handleFileChange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try { const data = JSON.parse(ev.target.result); if (Array.isArray(data)&&data.length>0) { setProjects(data); showToast("Datos importados"); } else { showToast("Archivo inválido"); } } catch { showToast("Error al leer JSON"); }
      };
      reader.readAsText(file); importFile.value = "";
    };
    importBtn.addEventListener("click", handleImportClick);
    importFile.addEventListener("change", handleFileChange);
    const resetBtn = document.getElementById("resetBtn");
    const handleReset = () => {
      if (confirm("¿Resetear TODO el dashboard a datos iniciales?")) { setProjects(INIT); localStorage.removeItem(STORAGE_KEY); showToast("Dashboard reseteado"); }
    };
    resetBtn.addEventListener("click", handleReset);
    return () => {
      exportBtn.removeEventListener("click", handleExport);
      importBtn.removeEventListener("click", handleImportClick);
      importFile.removeEventListener("change", handleFileChange);
      resetBtn.removeEventListener("click", handleReset);
    };
  }, [projects]);

  function syncSharedItems(allProjects, changedProjectId, type, changedItem) {
    // Find all other projects that have an item with the same name
    const itemName = changedItem.name.trim();
    let syncCount = 0;
    const synced = allProjects.map(proj => {
      if (proj.id === changedProjectId) return proj;
      const list = type === "skill" ? proj.skills : type === "kb" ? proj.kb : (proj.instructions||[]);
      const idx = list.findIndex(x => x.name.trim() === itemName);
      if (idx === -1) return proj;
      // Found a match — update it
      syncCount++;
      const updatedList = list.map((x, i) => {
        if (i !== idx) return x;
        return { ...x, status: changedItem.status, owner: changedItem.owner, drive: changedItem.drive, notes: changedItem.notes || x.notes };
      });
      const key = type === "skill" ? "skills" : type === "kb" ? "kb" : "instructions";
      return { ...proj, [key]: updatedList };
    });
    return { synced, syncCount };
  }

  function upP(updatedProject) {
    setProjects(ps => {
      const prev = ps.find(x => x.id === updatedProject.id);
      if (!prev) return ps.map(x => x.id === updatedProject.id ? updatedProject : x);

      // Apply direct update first
      let next = ps.map(x => x.id === updatedProject.id ? updatedProject : x);
      let totalSynced = 0;

      // --- Sync SKILLS ---
      updatedProject.skills.forEach(newSk => {
        if (newSk.name === "skills a definir" || !newSk.name.trim()) return;
        const oldSk = prev.skills.find(s => s.name.trim() === newSk.name.trim());
        if (oldSk && oldSk.status === newSk.status && oldSk.owner === newSk.owner && oldSk.drive === newSk.drive && (oldSk.notes||"") === (newSk.notes||"")) return;
        const result = syncSharedItems(next, updatedProject.id, "skill", newSk);
        next = result.synced;
        totalSynced += result.syncCount;
      });

      // --- Sync KB files ---
      updatedProject.kb.forEach(newKb => {
        if (!newKb.name.trim()) return;
        const oldKb = prev.kb.find(k => k.name.trim() === newKb.name.trim());
        if (oldKb && oldKb.status === newKb.status && oldKb.owner === newKb.owner && oldKb.drive === newKb.drive && (oldKb.notes||"") === (newKb.notes||"")) return;
        const result = syncSharedItems(next, updatedProject.id, "kb", newKb);
        next = result.synced;
        totalSynced += result.syncCount;
      });

      // --- Sync Instructions ---
      (updatedProject.instructions||[]).forEach(newIns => {
        if (!newIns.name.trim()) return;
        const oldIns = (prev.instructions||[]).find(x => x.name.trim() === newIns.name.trim());
        if (oldIns && oldIns.status === newIns.status && oldIns.owner === newIns.owner && oldIns.drive === newIns.drive && (oldIns.notes||"") === (newIns.notes||"")) return;
        const result = syncSharedItems(next, updatedProject.id, "ins", newIns);
        next = result.synced;
        totalSynced += result.syncCount;
      });

      if (totalSynced > 0) {
        console.log("[VAU SYNC]", totalSynced, "projects synced");
        setTimeout(() => showToast("🔁 Sincronizado en " + totalSynced + " proyecto" + (totalSynced>1?"s":"") + " más"), 100);
      }

      return next;
    });
  }

  const allSk = projects.flatMap(p=>p.skills.filter(s=>s.name!=="skills a definir"));
  const allKb = projects.flatMap(p=>p.kb);
  const allIns = projects.flatMap(p=>(p.instructions||[]));

  const stats = tab==="skills" ? [
    { label:"Skills totales",   val:allSk.length,                                       bg:"rgba(30,26,52,0.04)", accent:"var(--soul-purple)" },
    { label:"Creadas",           val:allSk.filter(s=>s.status==="✅ Creada").length,     bg:"rgba(68,114,93,0.1)", accent:"#44725d" },
    { label:"Por crear",         val:allSk.filter(s=>s.status==="❌ Por crear").length,  bg:"rgba(96,96,133,0.08)", accent:"#606085" },
    { label:"Ola 2",             val:allSk.filter(s=>s.status==="⏳ Ola 2").length,      bg:"rgba(98,191,189,0.1)", accent:"#1e1a34" },
  ] : tab==="kb" ? [
    { label:"KB files totales",  val:allKb.length,                                          bg:"rgba(30,26,52,0.04)", accent:"var(--soul-purple)" },
    { label:"Actualizados",       val:allKb.filter(k=>k.status==="✅ Actualizado").length,  bg:"rgba(68,114,93,0.1)", accent:"#44725d" },
    { label:"Actualizar",         val:allKb.filter(k=>k.status==="🔄 Actualizar").length,   bg:"rgba(219,223,52,0.12)", accent:"#44725d" },
    { label:"Por crear",          val:allKb.filter(k=>k.status==="❌ Por crear").length,    bg:"rgba(96,96,133,0.08)", accent:"#606085" },
  ] : [
    { label:"Instructions totales", val:allIns.length,                                          bg:"rgba(30,26,52,0.04)", accent:"var(--soul-purple)" },
    { label:"Listas",               val:allIns.filter(x=>x.status==="✅ Lista").length,         bg:"rgba(68,114,93,0.1)", accent:"#44725d" },
    { label:"Actualizar",           val:allIns.filter(x=>x.status==="🔄 Actualizar").length,    bg:"rgba(219,223,52,0.12)", accent:"#44725d" },
    { label:"Por crear",            val:allIns.filter(x=>x.status==="❌ Por crear").length,     bg:"rgba(96,96,133,0.08)", accent:"#606085" },
  ];

  const visible = SECTIONS.map(s=>({
    ...s, projects:projects.filter(p=>s.ids.includes(p.id)&&(filter==="todos"||p.cat===filter))
  })).filter(s=>s.projects.length>0);

  const timeStr = lastSaved ? lastSaved.toLocaleTimeString("es-MX", {hour:"2-digit",minute:"2-digit"}) : "";

  return (
    <div style={{ padding:"0", fontFamily:"var(--font-main)", position:"relative", zIndex:1 }}>
      {/* Tab bar + save status */}
      <div style={{ display:"flex", gap:8, marginBottom:16, flexWrap:"wrap", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", gap:4 }}>
          {[["skills","Skills"],["kb","Knowledge Files"],["ins","Instructions"]].map(([val,label])=>(
            <button key={val} onClick={()=>setTab(val)}
              style={{ fontSize:13, padding:"6px 20px", borderRadius:24, fontWeight:tab===val?600:400,
                background:tab===val?"var(--soul-purple)":"transparent",
                color:tab===val?"var(--root-cream)":"var(--balance-purple)",
                border:tab===val?"none":"1px solid rgba(30,26,52,0.12)",
                letterSpacing:"-0.01em" }}>
              {label}
            </button>
          ))}
        </div>
        <span style={{ fontSize:11, color:"var(--balance-purple)", opacity:0.6 }}>
          {saving ? "Guardando..." : `Guardado ✓${timeStr ? " · " + timeStr : ""}`}
        </span>
      </div>

      {/* Category filters */}
      <div style={{ display:"flex", gap:5, marginBottom:16, flexWrap:"wrap" }}>
        {["todos",...Object.keys(CAT)].map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{ fontSize:11, padding:"4px 14px", borderRadius:20,
              background:filter===f?"var(--soul-purple)":"transparent",
              color:filter===f?"var(--root-cream)":"var(--balance-purple)",
              border:filter===f?"none":"1px solid rgba(30,26,52,0.1)",
              fontWeight:filter===f?600:400, letterSpacing:"0.01em" }}>
            {f==="todos"?"Todos":f}
          </button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:20 }}>
        {stats.map(m=>(
          <div key={m.label} style={{ background:m.bg, borderRadius:14, padding:"14px 16px", border:"1px solid rgba(30,26,52,0.04)" }}>
            <div style={{ fontSize:11, color:"var(--balance-purple)", marginBottom:6, fontWeight:500, opacity:0.7 }}>{m.label}</div>
            <div style={{ fontSize:28, fontWeight:700, color:m.accent, letterSpacing:"-0.03em", lineHeight:1 }}>{m.val}</div>
          </div>
        ))}
      </div>

      {/* Column headers */}
      <div style={{ display:"grid", gridTemplateColumns:"210px 1fr 1fr", gap:10, padding:"4px 14px 8px 14px" }}>
        {["Proyecto · Owner","Áreas Notion · MCP", tab==="skills"?"Skills · 🔁 compartida":tab==="kb"?"Knowledge Files":"Instructions"].map(h=>(
          <span key={h} style={{ fontSize:10, color:"var(--balance-purple)", letterSpacing:"0.04em", opacity:0.5, fontWeight:500 }}>{h.toUpperCase()}</span>
        ))}
      </div>

      {/* Sections */}
      {visible.map(sec=>(
        <div key={sec.cat}>
          <div style={{ fontSize:10, color:"var(--balance-purple)", letterSpacing:"0.08em", padding:"14px 0 6px 0", borderBottom:"1px solid rgba(30,26,52,0.06)", marginBottom:6, fontWeight:600, opacity:0.5 }}>
            {sec.label.toUpperCase()}
          </div>
          {sec.projects.map(p=><ProjectCard key={p.id} p={p} onUpdate={upP} tab={tab} allProjects={projects} />)}
        </div>
      ))}

      {/* Footer */}
      <div style={{ marginTop:16, padding:"12px 16px", borderRadius:12, border:"1px solid rgba(30,26,52,0.06)", fontSize:11, color:"var(--balance-purple)", background:"rgba(255,255,255,0.3)", opacity:0.7 }}>
        <div style={{ marginBottom:4 }}>
          {tab==="skills"
            ? "Clic en fila para expandir y editar · 🔁 N = compartida en N proyectos · Al cambiar status/owner/drive se sincroniza automáticamente"
            : tab==="kb"
            ? "🔁 N = KB compartido en N proyectos · Al cambiar status/owner/drive se sincroniza automáticamente · Formato .md · máx 5-8 por proyecto · máx 15K palabras"
            : "🔁 N = instrucción compartida en N proyectos · Al cambiar status/owner/drive se sincroniza automáticamente"}
        </div>
        <div style={{ fontSize:10, opacity:0.7 }}>
          Sincronización automática: al editar un item compartido 🔁, el cambio se refleja en todos los proyectos que lo tienen.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
